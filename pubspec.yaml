name: food_analyzer
description: 음식 사진 분석 및 영양소 추적 앱

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # 로컬 저장소 - 가볍고 빠른 NoSQL key-value store
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # 카메라 / 갤러리 접근
  image_picker: ^1.0.7
  # HTTP 클라이언트 (Anthropic API 호출)
  http: ^1.2.0
  # 상태 관리
  provider: ^6.1.2
  # 날짜 포맷
  intl: ^0.19.0
  # 아이콘
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Hive 코드 생성
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
